services:

  backend:
    
    build: ./backend

    env_file:
      - ./backend/.env

    ports:
      - "5000:5000"

    container_name: smart-reconciliation-backend

  
  frontend:

    build: ./frontend

    env_file:
      - ./frontend/.env
    
    ports:
      - "5173:5173"

    container_name: smart-reconciliation-frontend